<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <meta name="theme-color" content="#050508">
  <title>Rogue Runner — Rogue Repo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050508; overflow: hidden; }
    #c { display: block; width: 100vw; height: 100vh; }
    #ui { position: fixed; top: 0; left: 0; right: 0; padding: 12px; color: #0ff; font: 16px/1.4 monospace; pointer-events: none; }
    #menu { position: fixed; inset: 0; background: rgba(5,5,8,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
    #menu h1 { color: #0ff; font: 24px monospace; }
    #menu p { color: #888; font: 14px monospace; }
    #menu button { padding: 12px 24px; font: 16px monospace; background: #0ff; color: #050508; border: none; cursor: pointer; }
    #menu button:active { opacity: 0.8; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="ui"><span id="level">Level 1</span> · <span id="score">0</span></div>
  <div id="menu">
    <h1>Rogue Runner</h1>
    <p id="menuMsg">1000 levels. Jump to survive. Space, Up arrow, or click.</p>
    <button id="play">Play</button>
    <p><a href="/" style="color:#0ff">Back to Rogue Repo</a></p>
  </div>
  <script>
/* f95=mulberry32 f96=generateLevel f105=loadProgress f106=saveProgress f107=startGame f108=jump
   f109=gameOver f110=levelComplete f111=update f112=draw f113=loop f114=resize c90=MAX_LEVEL c91–c95=GRAVITY,JUMP,PLAYER_H,PLAYER_W,GROUND */
(function(){
  const sL='rogue_runner_level',sS='rogue_runner_score';
  const c90=1000,c91=0.6,c92=-12,c93=32,c94=24,c95=0.85;

  function f95(seed){
    return function(){ seed=(seed+0x6D2B79F5)>>>0; return seed/4294967296; };
  }
  function f96(n){
    const r=f95(n);
    const sp=3+n*0.08,cnt=5+Math.floor(n/50),obs=[];
    for(let i=0;i<cnt;i++) obs.push({x:400+i*220+r()*120,h:30+r()*35,w:24+r()*16});
    return {speed:sp,obstacles:obs};
  }

  const c=document.getElementById('c'),ctx=c.getContext('2d');
  const uL=document.getElementById('level'),uS=document.getElementById('score');
  const m=document.getElementById('menu'),mM=document.getElementById('menuMsg'),pB=document.getElementById('play');

  let W=0,H=0,s88='menu',s89=1,s90=0,s91=0,s92=0,s93=null,s94=0,lt=0,s95=1;

  function f114(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; }
  function f105(){
    try{
      const l=localStorage.getItem(sL),v=localStorage.getItem(sS);
      if(l) s95=Math.min(parseInt(l,10)||1,c90);
      if(v) s90=Math.max(0,parseInt(v,10)||0);
    }catch(_){}
  }
  function f106(){ try{ localStorage.setItem(sL,String(s89)); localStorage.setItem(sS,String(s90)); }catch(_){} }
  function f107(){ f105(); s89=s95; s93=f96(s89); s94=0; s91=H*c95-c93; s92=0; s88='play'; m.classList.add('hidden'); }
  function f108(){ if(s88!=='play')return; const gy=H*c95-c93; if(s91>=gy-2)s92=c92; }
  function f109(){ s88='gameover'; f106(); m.classList.remove('hidden'); mM.textContent='Game Over. Level '+s89+'. Space or Up to retry.'; }
  function f110(){ s89++; s90+=s89; if(s89>c90)s89=c90; f106(); s93=f96(s89); s94=0; }

  function f111(dt){
    if(s88!=='play')return;
    const gy=H*c95-c93; s92+=c91; s91+=s92*(dt/16);
    if(s91>gy){ s91=gy; s92=0; }
    const px=W*0.2,pl=px,pr=px+c94,pt=s91,pb=s91+c93,spd=s93.speed*(dt/16);
    for(let i=0;i<s93.obstacles.length;i++){
      const o=s93.obstacles[i]; o.x-=spd;
      if(o.x+o.w<pl&&i===s94){ s94++; s90+=10; }
      if(o.x<pr&&o.x+o.w>pl){ const ot=H*c95-o.h,ob=H*c95; if(pb>ot&&pt<ob)f109(); }
    }
    if(s94>=s93.obstacles.length)f110();
  }
  function f112(){
    ctx.fillStyle='#050508'; ctx.fillRect(0,0,W,H);
    if(s88!=='play')return;
    const gy=H*c95;
    ctx.fillStyle='#1a1a22'; ctx.fillRect(0,gy,W,H-gy);
    ctx.fillStyle='#0ff'; ctx.fillRect(W*0.2,s91,c94,c93);
    ctx.fillStyle='#f80'; for(const o of s93.obstacles) if(o.x+o.w>0) ctx.fillRect(o.x,gy-o.h,o.w,o.h);
    uL.textContent='Level '+s89; uS.textContent=s90;
  }
  function f113(now){ f114(); if(lt)f111(now-lt); lt=now; f112(); requestAnimationFrame(f113); }

  pB.addEventListener('click',f107);
  document.addEventListener('keydown',function(e){ if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); f108(); } });
  c.addEventListener('click',f108);

  f114(); f105();
  if(s95>1) mM.textContent='Resume from Level '+s95+'. 1000 levels. Space, Up arrow, or click to jump.';
  requestAnimationFrame(f113);
})();
  </script>
</body>
</html>
