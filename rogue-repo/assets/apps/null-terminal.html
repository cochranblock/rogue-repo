<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <meta name="theme-color" content="#050508">
  <title>Null Terminal — Rogue Repo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050508; color: #0f0; font: 14px/1.5 "Consolas","Monaco",monospace; overflow: hidden; }
    #term { padding: 16px; height: 100vh; overflow-y: auto; }
    .line { margin-bottom: 4px; }
    .line::before { content: "> "; color: #0a0; }
    .line.input::before { content: "$ "; }
    .line.output { color: #0f0; }
    .line.error { color: #f00; }
    .line.success { color: #0ff; }
    .line.hidden { display: none; }
    #inp { background: transparent; border: none; color: #0f0; font: inherit; width: 80%; outline: none; }
    #inp::placeholder { color: #050; }
    .cursor { display: inline-block; width: 8px; height: 1em; background: #0f0; animation: blink 1s step-end infinite; vertical-align: -2px; }
    @keyframes blink { 50% { opacity: 0; } }
    #menu { position: fixed; inset: 0; background: rgba(5,5,8,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
    #menu h1 { color: #0f0; font-size: 20px; }
    #menu p { color: #080; font-size: 12px; max-width: 320px; text-align: center; }
    #menu button { padding: 12px 24px; font: 14px monospace; background: #0f0; color: #050508; border: none; cursor: pointer; margin: 4px; }
    #menu button:active { opacity: 0.8; }
    .hidden { display: none !important; }
    a { color: #0ff; }
  </style>
</head>
<body>
  <div id="menu">
    <h1>NULL TERMINAL</h1>
    <p>Hack the vault. Type commands. Decode the keys. Escape the system.</p>
    <button id="play">Start</button>
    <button id="demo">Watch Demo</button>
    <p><a href="/">Back to Rogue Repo</a></p>
  </div>
  <div id="term" class="hidden">
    <div id="output"></div>
    <div class="line input"><input type="text" id="inp" autocomplete="off" autofocus placeholder="type command..."></div>
  </div>
  <script>
(function(){
  const out=document.getElementById('output'),inp=document.getElementById('inp');
  const menu=document.getElementById('menu'),term=document.getElementById('term');
  let level=1,keys=0,started=false,demoMode=false;
  function addLine(txt,cls){
    const d=document.createElement('div');
    d.className='line '+(cls||'output');
    d.textContent=txt;
    out.appendChild(d);
    out.scrollTop=out.scrollHeight;
  }
  function run(cmd){
    const c=cmd.trim().toLowerCase().split(/\s+/)[0]||'';
    if(!c){ addLine(''); return; }
    if(c==='crack'){ keys=Math.min(3,keys+1); addLine('Key acquired. '+keys+'/3','success'); return; }
    if(c==='decode'&&keys>=3){ addLine('VAULT OPENED. You win!','success'); addLine('Level complete. Rogue Bucks +42.'); return; }
    if(c==='decode'){ addLine('Need 3 keys. Crack more nodes.','error'); return; }
    if(c==='status'){ addLine('Level '+level); addLine('Keys: '+keys+'/3'); addLine('Progress: '+(keys*33)+'%'); return; }
    if(c==='key'){ addLine('Keys: '+keys+'/3'); return; }
    if(c==='help'){ addLine('help scan decode crack status key exit'); return; }
    if(c==='scan'){ addLine('Scanning... Found 3 nodes. Target: vault-0x7f'); return; }
    if(c==='exit'){ addLine('Session terminated.'); return; }
    if(c==='ls'){ addLine('bin  etc  var  vault  tmp'); return; }
    if(c==='cat'){ addLine('Access denied. Decode keys first.'); return; }
    if(c==='run'){ addLine('No executable specified.'); return; }
    addLine('Unknown: '+c+'. Type help.','error');
  }
  function startGame(){ menu.classList.add('hidden'); term.classList.remove('hidden'); inp.focus(); if(!started){ started=true; addLine('Null Terminal v1.0 — Connected.'); addLine('Type help for commands.'); } }
  function playDemo(){
    demoMode=true; keys=0; out.innerHTML=''; inp.parentElement.classList.add('hidden');
    addLine('Null Terminal v1.0 — Demo mode');
    const cmds=['help','scan','crack','crack','crack','decode'];
    let i=0;
    function step(){
      if(i>=cmds.length){ inp.parentElement.classList.remove('hidden'); addLine(''); addLine('Demo complete. Type commands to play!'); return; }
      addLine('$ '+cmds[i],'input');
      run(cmds[i]);
      i++;
      setTimeout(step,1200);
    }
    setTimeout(step,800);
  }
  document.getElementById('play').onclick=startGame;
  document.getElementById('demo').onclick=function(){ startGame(); setTimeout(playDemo,600); };
  if(/[?&]demo=1/.test(location.search)){ startGame(); setTimeout(playDemo,400); }
  inp.onkeydown=function(e){
    if(e.key==='Enter'){
      const v=inp.value;
      addLine('$ '+v,'input');
      run(v);
      inp.value='';
    }
  };
})();
  </script>
</body>
</html>
