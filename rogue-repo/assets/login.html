<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#050508">
  <title>Login — Rogue Repo</title>
  <link rel="icon" type="image/svg+xml" href="/assets/icon-192.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #050508; color: #e8e8e8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: #0d0d12; border: 1px solid rgba(0,217,255,0.2); border-radius: 12px; padding: 2rem; max-width: 400px; width: 100%; }
    h1 { color: #00d9ff; font-size: 1.5rem; margin-bottom: 1.5rem; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .tabs a { padding: 0.5rem 1rem; color: rgba(232,232,232,0.7); text-decoration: none; border-radius: 8px; }
    .tabs a:hover, .tabs a.active { color: #00d9ff; background: rgba(0,217,255,0.1); }
    label { display: block; margin-bottom: 0.25rem; font-size: 0.9rem; color: rgba(232,232,232,0.8); }
    input { width: 100%; padding: 0.75rem; background: #050508; border: 1px solid rgba(0,217,255,0.3); border-radius: 8px; color: #e8e8e8; font-size: 1rem; margin-bottom: 1rem; }
    input:focus { outline: none; border-color: #00d9ff; }
    button { width: 100%; padding: 0.75rem; background: #00d9ff; color: #050508; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #33e1ff; }
    .msg { padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
    .msg.err { background: rgba(255,80,80,0.2); color: #ff8080; }
    .msg.ok { background: rgba(0,217,255,0.15); color: #00d9ff; }
    .back { margin-top: 1rem; text-align: center; }
    .back a { color: #00d9ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Rogue Repo</h1>
    <div class="tabs">
      <a href="/login" class="active">Login</a>
      <a href="/register">Register</a>
    </div>
    <div id="msg"></div>
    <form action="/login" method="post">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">
      <button type="submit">Login</button>
    </form>
    <div class="back"><a href="/">Back to home</a></div>
  </div>
  <script>
    (function(){
      var q = new URLSearchParams(location.search);
      var m = document.getElementById('msg');
      if (q.get('error') === 'invalid_token') m.innerHTML = '<div class="msg err">Verification link expired or invalid.</div>';
      else if (q.get('error') === 'missing_token') m.innerHTML = '<div class="msg err">Missing verification token.</div>';
      else if (q.get('error') === 'db') m.innerHTML = '<div class="msg err">Service unavailable.</div>';
      else if (q.get('verified') === '1') m.innerHTML = '<div class="msg ok">Email verified. You can log in now.</div>';
      else if (q.get('registered') === '1') m.innerHTML = '<div class="msg ok">Check your email for the verification link.</div>';
    })();
  </script>
</body>
</html>
